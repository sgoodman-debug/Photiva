[build]
  command = "npm run build"
  publish = ".next"

# Next.js runtime (SSR, API routes, image optimisation)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Cache headers ──────────────────────────────────────────────────────────────
# /_next/static/ files are always content-hashed by Next.js/Turbopack, so they
# are safe to cache immutably for 1 year. Without this rule Netlify serves them
# with no Cache-Control header, which PageSpeed flags as "short cache TTLs".
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Public assets (images, fonts, icons) — also hashed or effectively immutable.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
