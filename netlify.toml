# Cache headers only — do NOT add [build] or [[plugins]] here.
# Netlify auto-detects Next.js and uses its built-in runtime; overriding that
# with publish=".next" or @netlify/plugin-nextjs breaks SSR and image optimisation.

# /_next/static/ files are content-hashed by Next.js/Turbopack — safe to cache
# immutably for 1 year. Netlify's CDN applies these at the edge.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
